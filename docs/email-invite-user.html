<div style="background-color:#2c5a1e;padding:40px 0;font-family:Arial,sans-serif;">
  <div style="max-width:480px;margin:0 auto;background-color:#4e342e;border-radius:12px;border:3px solid #8d6e63;overflow:hidden;">
    <div style="background-color:#5d4037;padding:24px;text-align:center;">
      <h1 style="font-size:28px;color:#f9a825;margin:0;letter-spacing:2px;">Stardew Completionist</h1>
    </div>
    <div style="padding:32px 28px;text-align:center;">
      <h2 style="color:#fdf6e3;font-size:20px;margin:0 0 12px;">You've Been Invited!</h2>
      <p style="color:#e8e0d4;font-size:15px;line-height:1.6;margin:0 0 28px;">
        Someone invited you to track your Stardew Valley progress. Accept the invitation to create your account and start checking off bundles, recipes, and more.
      </p>
      <a href="{{ .ConfirmationURL }}"
         style="display:inline-block;background-color:#f9a825;color:#4e342e;font-size:16px;font-weight:bold;padding:12px 32px;border-radius:6px;text-decoration:none;border:3px solid #4e342e;">
        Accept Invitation
      </a>
      <p style="color:#8d6e63;font-size:12px;margin:28px 0 0;line-height:1.5;">
        If you didn't expect this invitation, you can safely ignore this email.
      </p>
    </div>
  </div>
</div>
